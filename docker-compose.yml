services:
  fyntrac-py-model:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fyntrac-py-model
    ports:
      - "8090:8090"
    environment:
      # MongoDB
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-root}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-R3s3rv#313}
      MONGODB_AUTH_DATABASE: ${MONGODB_AUTH_DATABASE:-admin}
      MONGODB_DEFAULT_DATABASE: ${MONGODB_DEFAULT_DATABASE:-master}
      # Pulsar
      PULSAR_SERVICE_URL: ${PULSAR_SERVICE_URL:-pulsar://pulsar:6650}
      # Memcached
      MEMCACHED_HOST: ${MEMCACHED_HOST:-memcached}
      MEMCACHED_PORT: ${MEMCACHED_PORT:-11211}
      # ZITADEL
      ZITADEL_ISSUER_URI: ${ZITADEL_ISSUER_URI}
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3030}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - fyntrac-network

networks:
  fyntrac-network:
    external: true
